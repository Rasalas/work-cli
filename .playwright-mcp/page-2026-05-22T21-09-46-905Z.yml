  - main [ref=e11]:
    - generic [ref=e14]:
      - generic [ref=e15]:
        - heading "tagger" [level=1] [ref=e16]
        - paragraph [ref=e17]: Semantische Git-Tags aus Conventional Commits
        - paragraph [ref=e18]: "tagger automatisiert den letzten Schritt im Release-Workflow: Commits seit dem letzten Tag lesen, anhand von Conventional Commits den passenden Semver-Bump bestimmen und daraus den nächsten Git-Tag ableiten."
        - paragraph [ref=e19]:
          - img "Beispielausgabe von tagger status" [ref=e20]
        - heading "Funktionen" [level=2] [ref=e21]
        - list [ref=e22]:
          - listitem [ref=e23]:
            - strong [ref=e24]: Semver-Ermittlung
            - text: "-"
            - code [ref=e25]: feat
            - text: ","
            - code [ref=e26]: fix
            - text: ","
            - code [ref=e27]: refactor
            - text: ","
            - code [ref=e28]: perf
            - text: und Breaking Changes werden in Major-, Minor- oder Patch-Bumps übersetzt.
          - listitem [ref=e29]:
            - strong [ref=e30]: Vorschau ohne Seiteneffekte
            - text: "-"
            - code [ref=e31]: tagger status
            - text: und
            - code [ref=e32]: tagger suggest
            - text: zeigen den nächsten Tag, ohne etwas im Repository zu verändern.
          - listitem [ref=e33]:
            - strong [ref=e34]: Tag-Erstellung mit Bestätigung
            - text: "-"
            - code [ref=e35]: tagger bump
            - text: erstellt den nächsten Tag und fragt vor dem Schreiben nach.
          - listitem [ref=e36]:
            - strong [ref=e37]: Release-Automation
            - text: "-"
            - code [ref=e38]: tagger bump --yes
            - text: kann Tags ohne Dialog erstellen und direkt pushen.
          - listitem [ref=e39]:
            - strong [ref=e40]: Build-Suffixe
            - text: "- Tags wie"
            - code [ref=e41]: v3.4.0-58
            - text: werden erkannt; die Semver-Komponente wird gebumpt und die Build-Nummer erhöht.
          - listitem [ref=e42]:
            - strong [ref=e43]: Kompakter Scope
            - text: "- Kein Changelog, keine Release Notes, keine Projektverwaltung: tagger macht genau den Git-Tag."
        - heading "Workflow" [level=2] [ref=e44]
        - paragraph [ref=e45]:
          - text: Im Alltag reicht erst eine Vorschau mit
          - code [ref=e46]: tagger status
          - text: . Wenn der vorgeschlagene Tag passt, erstellt
          - code [ref=e47]: tagger bump
          - text: denselben Tag mit Bestätigung; in CI- oder Script-Kontexten übernimmt
          - code [ref=e48]: tagger bump --yes
          - text: den nicht-interaktiven Pfad.
        - heading "Installation" [level=2] [ref=e49]
        - paragraph [ref=e50]:
          - text: Die aktuelle Version lässt sich mit
          - code [ref=e51]: go install github.com/rasalas/tagger@latest
          - text: installieren.
